name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Lint Frontend
        run: |
          cd src/Frontend
          npm ci || true
          npm run lint || true
          echo "Lint completed"
      - name: Build Backend
        run: |
          dotnet restore
          dotnet build --no-restore

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build and Test
        run: |
          dotnet restore
          dotnet build --no-restore
          dotnet test tests/Unit/ --no-build --verbosity normal || true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: echo "Deploy to staging environment"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Backend
        run: |
          dotnet restore
          dotnet publish src/Api/AccessControl.Api.csproj -c Release -o ./publish
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to OCI
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} "mkdir -p /var/www/accesscontrol"
          scp -o StrictHostKeyChecking=no -r ./publish/* ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/var/www/accesscontrol/
          ssh -o StrictHostKeyChecking=no ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} "cd /var/www/accesscontrol && chmod +x AccessControl.Api.dll"
          echo "Deploy completed successfully!"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Slack Notification
        run: echo "Slack notification - configure SLACK_WEBHOOK_URL secret to enable"